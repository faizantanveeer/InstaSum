{% extends "base.html" %}

{% block content %}
<section class="auth-wrap">
  <div class="auth-card">
    <h2>Login</h2>
    <p class="subtle">Sign in to access your private reels workspace.</p>
    <form method="post" action="{{ url_for('auth.login_post') }}" class="input-form">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required />
      <button type="submit" class="primary">Login</button>
    </form>
    <p class="subtle">No account? <a href="{{ url_for('auth.signup') }}">Create one</a>.</p>
  </div>
</section>
{% endblock %}
